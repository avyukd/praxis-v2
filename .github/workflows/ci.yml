name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: praxis
          POSTGRES_PASSWORD: praxis
          POSTGRES_DB: praxis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check praxis_core handlers services tests

      - name: Ruff format (check only)
        run: uv run ruff format --check praxis_core handlers services tests

      - name: Pyright
        run: uv run pyright praxis_core handlers services

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Run integration tests
        env:
          PRAXIS_TEST_DATABASE_URL: postgresql+asyncpg://praxis:praxis@localhost:5432/praxis_test
        run: |
          # Create extension + basic schema for migrations to run
          PGPASSWORD=praxis psql -h localhost -U praxis -d praxis_test -c 'CREATE EXTENSION IF NOT EXISTS "pgcrypto";'
          uv run pytest tests/integration/ -v
